<!DOCTYPE html>
<html>
<head>
    <title>Task Form</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .form-container { max-width: 500px; margin: auto; padding: 20px; border: 1px solid #ccc; }
        button { padding: 10px 15px; background-color: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>{% if form.instance.id %}Edit Task{% else %}Create Task{% endif %}</h2>
        
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Save Task</button>
        </form>
        
        <br>
        <a href="{% url 'task_list' %}">Cancel and return to list</a>
    </div>
</body>
</html>
